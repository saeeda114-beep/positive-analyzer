<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>منصة السلوك والمواظبة</title>

<style>

body{
    margin:0;
    font-family:Tahoma, Arial;
    background:#f3f6f8;
    color:#1a2a35;
}

.header{
    background:#0f3d4c;
    color:white;
    padding:35px 20px;
    text-align:center;
}

.header h1{
    margin:0;
    font-size:38px;
}

.header p{
    margin-top:10px;
    opacity:.9;
}

.tools-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    max-width:1000px;
    margin:50px auto;
    padding:0 20px;
}

.tool-card{
    background:white;
    border-radius:20px;
    padding:30px;
    text-align:center;
    text-decoration:none;
    color:#1a2a35;
    box-shadow:0 4px 14px rgba(0,0,0,.08);
    border:1px solid #d4dde4;
    transition:.2s;
}

.tool-card:hover{
    transform:translateY(-5px);
    border-color:#1d5c6e;
}

.tool-icon{
    font-size:55px;
    margin-bottom:15px;
}

.tool-card h3{
    margin:0 0 10px;
    color:#0f3d4c;
    font-size:24px;
}

.tool-card p{
    margin:0;
    color:#607d8b;
    line-height:1.8;
}

.footer{
    text-align:center;
    padding:30px;
    color:#78909c;
    font-size:14px;
}

</style>

</head>

<body>

<div class="header">
    <h1>📊 منصة السلوك والمواظبة</h1>
    <p>
        أدوات تحليل السلوك الإيجابي والغياب والمخالفات المدرسية
    </p>
</div>

<section class="tools-grid">

    <a class="tool-card" href="positive.html">

        <div class="tool-icon">⭐</div>

        <h3>محلل الإيجابيات</h3>

        <p>
            تحليل السلوك الإيجابي وإنشاء التقارير والرسوم البيانية.
        </p>

    </a>

    <a class="tool-card" href="attendance.html">

        <div class="tool-icon">📋</div>

        <h3>محلل الغياب</h3>

        <p>
            تحليل الغياب والمواظبة والمقارنات الزمنية والتقارير.
        </p>

    </a>

</section>

<div class="footer">
    منصة مدرسية لتحليل السلوك والمواظبة © 2025
</div>

</body>
</html>
